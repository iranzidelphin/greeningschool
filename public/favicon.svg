<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="treeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trunkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#78350f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Tree crown -->
  <ellipse cx="50" cy="35" rx="30" ry="25" fill="url(#treeGradient)"/>
  <ellipse cx="35" cy="45" rx="20" ry="18" fill="url(#treeGradient)"/>
  <ellipse cx="65" cy="45" rx="20" ry="18" fill="url(#treeGradient)"/>
  <ellipse cx="50" cy="55" rx="25" ry="20" fill="url(#treeGradient)"/>
  <!-- Tree trunk -->
  <rect x="45" y="70" width="10" height="25" rx="2" fill="url(#trunkGradient)"/>
  <!-- Ground -->
  <ellipse cx="50" cy="95" rx="35" ry="5" fill="#065f46" opacity="0.3"/>
</svg>
