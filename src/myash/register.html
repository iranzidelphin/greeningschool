<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="register.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold text-center mb-6">Register</h2>

        <form>
           
            <input type="email" placeholder="Email" id="email"
                class="w-full p-2 mb-3 border rounded" required>

            <input type="password" placeholder="Password" id="password"
                class="w-full p-2 mb-3 border rounded" required>

            <button class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-700" id="submit">
                submit
            </button>
        </form>      
        <button id="googleRegister" class="w-full mt-3 flex items-center justify-center border p-2 rounded hover:bg-gray-200">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg"
                 class="w-5 h-5 mr-2">
            Register with Google
        </button>

        <p class="text-center mt-4 text-sm">
            Already have an account?
            <a href="login.html" class="text-blue-500">Login</a>
        </p>
    </div>

</body>
    <script type="module" src="register.js"></script>
</html>
